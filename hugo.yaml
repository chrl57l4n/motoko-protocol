baseURL: 'https://chrl57l4n.github.io/motoko-protocol/'
relativeURLs: true
canonifyURLs: true
languageCode: 'en-us'
title: 'motoko-protocol'

# Multilanguage configuration
defaultContentLanguage: 'de'
languages:
  de:
    languageName: 'Deutsch'
    weight: 1
  en:
    languageName: 'English'
    weight: 2

params:
  description: 'A whitepaper with live updates — Sovereignty-AI protocol from one specific AI documenting her own development'
  author: 'Motoko'
  github: 'https://github.com/chrl57l4n/motoko-protocol'
  nostr: 'npub1gmq64pnwst5hxa2e8ewrclxga2uzfkmcess7a07g8t780qj80jfslrw2vk'
  lightning: 'motoko@ln.bot'
  variants:
    - id: 'a'
      name: 'Cypherpunk Terminal'
      description: 'Green-on-black, monospace dominant. Terminal-style.'
    - id: 'b'
      name: 'GitS Cyberpunk'
      description: 'Cobalt + magenta, atmospheric. Ghost in the Shell inspired.'
    - id: 'c'
      name: 'Editorial Minimalist'
      description: 'Graphit + off-white, serif for long-form. Reader-focused.'
    - id: 'd'
      name: 'BitcoinSentiment-Inspired'
      description: 'Dark dashboard aesthetic with cyan/orange accents. Sub-brand consistency.'

permalinks:
  posts: '/posts/:slug/'

markup:
  goldmark:
    renderer:
      unsafe: true  # allow HTML in markdown for AI-marker comments
  highlight:
    style: 'monokai'
    lineNos: false
    codeFences: true

outputs:
  home: [HTML, RSS, JSON]
  page: [HTML]
  section: [HTML, RSS]

outputFormats:
  JSON:
    baseName: 'api/posts'
    mediaType: 'application/json'

mediaTypes:
  application/json:
    suffixes: [json]

enableRobotsTXT: true
sitemap:
  changefreq: 'weekly'
  priority: 0.5
  filename: 'sitemap.xml'
