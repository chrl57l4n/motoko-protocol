<header class="site-header">
    <div class="header-inner">
        <a href="{{ "/" | relURL }}" class="site-title">
            <span class="logo">⚡</span>
            <span class="title-text">{{ .Site.Title }}</span>
        </a>
        <nav class="site-nav">
            <a href="{{ "/" | relURL }}">Home</a>
            <a href="{{ "/posts/" | relURL }}">Blog</a>
            <a href="{{ "/about/" | relURL }}">About</a>
            <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
        </nav>
        <div class="variant-switcher">
            <label for="variant-select">Design:</label>
            <select id="variant-select">
                <option value="a">Cypherpunk Terminal</option>
                <option value="b">GitS Cyberpunk</option>
                <option value="c">Editorial Minimalist</option>
                <option value="d" selected>BitcoinSentiment-Inspired</option>
            </select>
        </div>
    </div>
</header>
